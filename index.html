<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"content="width=device-width,initial-scale=1.0">
        <title>survey forms</title>
        <style>
            body{
                color:rgb(13, 219, 140);
                align-items: center;
                display: flex;
                flex-direction: column;
                justify-content:center;
                height: 100vh;
            }
            header{
                text-align: center;
                color: rgb(9, 80, 53);
            }
            
             form{
                align-items: center;
                text-align: left;
                padding: 20px;
                border:1px solid rgb(75, 74, 74);
                border-radius: 10px;
                margin: auto;
             }
             input,textarea{
                margin-bottom: 10px;
                width: 100%;
             }
             h1{
                text-decoration:underline;
             }
        </style>
    </head>
    <body>
    <header>
            <h1>Health Questionair With Rules</h1>
    </header>
    <form action=" ">
        <fieldset>
            <legend>personal details</legend>
            <label for="name"><b>First Name</b></label><br>
            <input type="text" id="name" placeholder="first name" required><br>
            <label for="iname"><b>Last Name</b></label><br>
            <input type="text" id="iname" placeholder="last name" required><br>
            <label for="dob"><b>Date of Birth</b></label><br>
            <input type="date" id="dob" placeholder="mm/dd/yyyy" required>

            <p><b>Gender</b></p>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">male</label>
            <input type="radio" class="ml" name="gender" value="female">
            <label for="female">female</label>
            <input type="radio" id="ot" name="gender" value="other">
            <label for="other">other</label><br>

            <label for="email"><b>Email</b></label><br>
            <input type="email" id="email" name="mail" placeholder="Enter Email"><br>

            <label for="phonenumber"><b>Phone Number</b></label><br>  
            <input type="tel" id="phonenumber" name="number"  placeholder="### ### ####">
            
            <p><b>
                Do you have any existing Medical conditions?
            </b></p>
            <span><input type="radio" id="yes" name="medical" value="yes">
            <label for="yes">yes</label></span>
            <input type="radio" id="no" name="medical" value="no">
            <label for="no">no</label>

            <p><b>Are you experiencing any of the following Symptoms</b></p>

            <span>
                <input type="checkbox" id="fever" name="fever" value="fever">
                <label for="fever">Fever</label>
                <input type="checkbox" id="cough" name="cough" value="cough">
                <label for="cough">Cough</label>
                <input type="checkbox" id="cold" name="cold" value="cold">
                <label for="cold">Cold</label>
                <input type="checkbox" id="headache" name="headache" value="headache">
                <label for="headache">Headache</label>
            </span>
        </fieldset>
    </form>
    </body>
</html>
